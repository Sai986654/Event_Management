# Backend: install, Prisma checks, optional integration tests with PostgreSQL
name: CI — Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

defaults:
  run:
    working-directory: backend

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vedika360_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vedika360_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vedika360_test
      # Same as DATABASE_URL in CI (no pooler); required by prisma/schema.prisma directUrl
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/vedika360_test
      JWT_SECRET: ci-test-jwt-secret-min-32-chars-long!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate & generate
        run: npx prisma validate && npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test -- --forceExit --detectOpenHandles
        timeout-minutes: 10
