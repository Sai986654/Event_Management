name: Keep Render Backend Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-render-backend-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      HEALTHCHECK_URL: ${{ vars.RENDER_BACKEND_HEALTHCHECK_URL }}
    steps:
      - name: Validate health check URL
        shell: bash
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "RENDER_BACKEND_HEALTHCHECK_URL repo variable is not set."
            exit 0
          fi

      - name: Ping Render health endpoint until ready
        shell: bash
        run: |
          echo "Pinging $HEALTHCHECK_URL"

          for attempt in {1..12}; do
            status_code=$(curl -sS -o /tmp/render-health.json -w "%{http_code}" --max-time 20 "$HEALTHCHECK_URL" || true)
            echo "Attempt $attempt returned HTTP $status_code"

            if [ "$status_code" = "200" ]; then
              cat /tmp/render-health.json
              exit 0
            fi

            sleep 10
          done

          echo "Backend did not become healthy in time."
          cat /tmp/render-health.json || true
          exit 1