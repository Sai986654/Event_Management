version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eventos-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventos
    volumes:
      - pg-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: eventos-backend
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/eventos
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: eventos-frontend
    ports:
      - '3000:3000'
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg-data:
